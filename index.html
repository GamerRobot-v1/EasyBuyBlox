

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>EasyBuyBlox</title>
  <link rel="icon" type="image/png" href="logo.png">

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: Arial, sans-serif;
    }

    body {
      background: #f4f4f4;
    }

    /* Navbar */
    .navbar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      background: linear-gradient(90deg, #4a6cf7, #6a82fb);
      padding: 15px 30px;
      color: white;
    }

    .logo {
      display: flex;
      align-items: center;
      font-size: 24px;
      font-weight: bold;
    }

    .logo-box {
      width: 40px;
      height: 40px;
      object-fit: cover;
      margin-right: 10px;
      display: block;
    }

    .nav-links a {
      color: white;
      margin-left: 20px;
      text-decoration: none;
      font-size: 16px;
      transition: 0.3s;
    }

    .nav-links a:hover {
      opacity: 0.7;
    }

    /* Hero Banner */
    .hero {
      margin: 20px;
      width: 100%;
    }

    .hero-img {
      width: 100%;
      height: auto; /* keeps aspect ratio (no stretch) */
      display: block;
    }

    /* Products */
    .products {
      padding: 20px;
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
      gap: 20px;
    }

    .product-card {
      background: white;
      border-radius: 12px;
      overflow: hidden;
      box-shadow: 0 4px 10px rgba(0,0,0,0.1);
      transition: transform 0.2s;
    }

    .product-card:hover {
      transform: translateY(-5px);
    }

    .product-image {
      width: 100%;
      height: 200px;
      object-fit: cover;
      display: block;
    }

    .product-info {
      padding: 15px;
    }

    .product-title {
      font-size: 18px;
      margin-bottom: 10px;
    }

    .product-price {
      color: #4a6cf7;
      font-weight: bold;
      margin-bottom: 10px;
    }

    .btn {
      display: inline-block;
      padding: 10px 15px;
      background: #4a6cf7;
      color: white;
      border-radius: 6px;
      text-decoration: none;
      transition: 0.3s;
    }

    .btn:hover {
      background: #3b5be0;
    }

    /* Footer */
    footer {
      text-align: center;
      padding: 20px;
      background: #222;
      color: white;
      margin-top: 20px;
    }
  </style>
</head>

<body>

  <div class="navbar">
    <div class="logo">
      <a href="index.html">
        <img src="logo.png" class="logo-box" alt="Logo">
      </a>
      EasyBuyBlox
    </div>
    <div class="nav-links">
      <a href="index.html">Home</a>
      <a href="contact.html">Contact</a>
      <a href="more.html">More</a>
    </div>
  </div>

  <!-- Hero Banner -->
  <div class="hero">
    <a href="gik.html">
      <img src="banner.png" alt="Banner" class="hero-img">
    </a>
  </div>

  <div class="products">

    <!-- Product Card -->
    <div class="product-card">
      <a>
        <img src="gik.png" class="product-image" alt="Product">
      </a>
      <div class="product-info">
        <div class="product-title">Galaxy Kitsune</div>
        <div class="product-price">R$499</div>
        <a href="gik.html" class="btn">Buy Now</a>
      </div>
    </div>

        <div class="product-card">
      <a>
        <img src="product.png" class="product-image" alt="Product">
      </a>
      <div class="product-info">
        <div class="product-title">Product</div>
        <div class="product-price">R$0.00</div>
        <a href="#" class="btn">Buy Now</a>
      </div>
    </div>
  </div>

  <footer>
    © 2026 EasyBuyBlox - All Rights Reserved
  </footer>

</body>
</html>
